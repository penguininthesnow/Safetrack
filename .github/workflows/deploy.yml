name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 44.206.95.4
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script: |
            cd /home/ubuntu/Safetrack
            git pull origin main
            npm install
            pm2 restart app